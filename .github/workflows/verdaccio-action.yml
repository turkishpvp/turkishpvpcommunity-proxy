name: Publish to Verdaccio Action (Test)
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  publish-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup npmrc for private registry
        run: |
          echo "registry=https://registry.npmjs.org/" > .npmrc
          echo "@turkishpvp:registry=https://verdaccio.turkishpvp.llc/" >> .npmrc
          echo "//verdaccio.turkishpvp.llc/:_authToken=${{ secrets.VERDACCIO_TOKEN }}" >> .npmrc
          echo "legacy-peer-deps=true" >> .npmrc

      - name: Build and Publish (Ignore internal missing deps for publish)
        run: |
          # Try to install dependencies. If it fails due to missing @turkishpvp packages (ETARGET),
          # we will still try to publish this package so downstream can use it later.
          npm install --legacy-peer-deps || echo "Some internal packages not available yet. Continuing to publish..."
          
          # Try to build if script exists
          npm run build --if-present || echo "Build failed, possibly due to missing types from internal packages. Still publishing..."

          # Always attempt to publish so other packages aren't blocked forever
          npm publish --registry https://verdaccio.turkishpvp.llc/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}