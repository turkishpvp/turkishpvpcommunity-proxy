name: Publish to Verdaccio Action (Test)
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  publish-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup npmrc for private registry
        run: |
          echo "registry=https://registry.npmjs.org/" > .npmrc
          echo "@turkishpvp:registry=https://verdaccio.turkishpvp.llc/" >> .npmrc
          echo "//verdaccio.turkishpvp.llc/:_authToken=${{ secrets.VERDACCIO_TOKEN }}" >> .npmrc
          echo "legacy-peer-deps=true" >> .npmrc

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project if exists
        run: npm run build --if-present

      - name: Publish with Verdaccio
        uses: verdaccio/github-actions/publish@master
        env:
          NODE_AUTH_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}